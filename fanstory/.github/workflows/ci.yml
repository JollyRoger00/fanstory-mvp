name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fanstory?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/fanstory?schema=public
      AUTH_SECRET: replace-with-a-long-random-secret-at-least-32-characters
      AUTH_GOOGLE_ID: google-client-id
      AUTH_GOOGLE_SECRET: google-client-secret
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STORY_PROVIDER: openai
      OPENAI_API_KEY: test-openai-api-key
      OPENAI_MODEL: gpt-4.1-mini
      ENABLE_DEV_BILLING_TOOLS: "false"
      STORY_FREE_CHAPTERS: "1"
      STORY_DEFAULT_CHAPTER_PRICE: "15"
      STORY_DEMO_TOP_UP_AMOUNT: "100"
      STORY_STARTER_CREDITS: "60"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run check
